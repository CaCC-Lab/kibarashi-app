get:
  summary: 気晴らし提案の取得
  description: |
    指定された状況と利用可能時間に基づいて、3つの気晴らし提案を返します。
    提案はGemini APIを使用して生成され、フォールバックデータも用意されています。

    **文脈軸（Phase 1）**: `season` / `weather` / `temperatureBand` / `partOfDay` /
    `dayType` / `mood` は optional。サーバの環境変数 `CONTEXT_AXES_ENABLED=true`
    の環境でのみ絞り込みに使用されます。未サポート値は **400 ではなく無視**され
    軸なしクエリとして処理されます（後方互換のため）。
    `mood` は心理情報のため、サーバログ上では値そのものではなくハッシュ化された形で扱われます。
  operationId: getSuggestions
  tags:
    - suggestions
  parameters:
    - $ref: '../components/parameters/Situation.yaml'
    - $ref: '../components/parameters/Duration.yaml'
    - name: ageGroup
      in: query
      description: 年齢層（オプション）
      required: false
      schema:
        type: string
        enum: ['student', 'adult', 'senior']
        default: 'adult'
    # 自動文脈軸（Phase 1 / すべて optional）— 詳細は operation description 参照
    - name: season
      in: query
      description: 季節（任意）
      required: false
      schema:
        type: string
        enum: ['spring', 'summer', 'autumn', 'winter']
    - name: weather
      in: query
      description: 天気（任意）
      required: false
      schema:
        type: string
        enum: ['sunny', 'cloudy', 'rainy', 'snowy']
    - name: temperatureBand
      in: query
      description: 気温帯（任意）。cold=<10, cool=10-16, mild=17-22, warm=23-27, hot=28+（℃）
      required: false
      schema:
        type: string
        enum: ['cold', 'cool', 'mild', 'warm', 'hot']
    - name: partOfDay
      in: query
      description: 時間帯（任意）。morning=5-10, daytime=11-16, evening=17-20, night=21-4
      required: false
      schema:
        type: string
        enum: ['morning', 'daytime', 'evening', 'night']
    - name: dayType
      in: query
      description: 平日/週末/祝日（任意）。祝日判定は japanese-holidays ライブラリで自動。
      required: false
      schema:
        type: string
        enum: ['weekday', 'weekend', 'holiday']
    - name: mood
      in: query
      description: 気分（任意）。心理情報のためサーバログではハッシュ化される。
      required: false
      schema:
        type: string
        enum: ['tired', 'anxious', 'irritated', 'lonely', 'bored', 'sad', 'calm']
    - name: intent
      in: query
      description: 介入タイプ（任意）。activating=元気回復、calming=落ち着き、mindful=今に集中、problem_solving=思考整理。
      required: false
      schema:
        type: string
        enum: ['activating', 'calming', 'mindful', 'problem_solving']
    - name: seasonalEvent
      in: query
      description: 当日アクティブな季節イベント（任意）。フロントは /api/v1/seasonal-events で取得。
      required: false
      schema:
        type: string
        enum: ['rainy_season', 'gw', 'obon', 'year_end_new_year', 'fiscal_year_change', 'pollen_high', 'heat_wave']
  responses:
    '200':
      description: 提案の取得に成功
      content:
        application/json:
          schema:
            $ref: '../components/schemas/SuggestionsResponse.yaml'
          examples:
            workplace5min:
              summary: 職場で5分の提案例
              value:
                suggestions:
                  - id: "uuid-1"
                    title: "デスクで深呼吸"
                    description: "椅子に座ったまま、ゆっくりと深呼吸を繰り返します"
                    duration: 5
                    category: "認知的"
                    steps:
                      - "背筋を伸ばして座る"
                      - "鼻から4秒かけて息を吸う"
                      - "4秒間息を止める"
                      - "口から4秒かけて息を吐く"
                      - "これを5回繰り返す"
                  - id: "uuid-2"
                    title: "軽いストレッチ"
                    description: "席を立って、簡単な全身ストレッチを行います"
                    duration: 5
                    category: "行動的"
                    steps:
                      - "立ち上がって深呼吸"
                      - "両手を上に伸ばす"
                      - "左右に体を傾ける"
                      - "肩を回す"
                  - id: "uuid-3"
                    title: "ポジティブ思考"
                    description: "今日の良かったことを3つ思い出します"
                    duration: 5
                    category: "認知的"
                    steps:
                      - "目を閉じてリラックス"
                      - "今日の良い出来事を思い出す"
                      - "感謝の気持ちを持つ"
                metadata:
                  situation: "workplace"
                  duration: 5
                  timestamp: "2025-01-07T12:00:00.000Z"
    '400':
      $ref: '../components/responses/BadRequest.yaml'
    '429':
      $ref: '../components/responses/TooManyRequests.yaml'
    '500':
      $ref: '../components/responses/InternalServerError.yaml'